<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envision OS — Authorization Complete</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #818cf8;
    --accent-glow: rgba(129, 140, 248, 0.15);
    --success: #34d399;
    --success-glow: rgba(52, 211, 153, 0.15);
    --error: #f87171;
    --error-glow: rgba(248, 113, 113, 0.15);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, var(--success-glow) 0%, transparent 50%);
    animation: drift 20s ease-in-out infinite;
    z-index: -1;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -20px) rotate(1deg); }
    66% { transform: translate(-20px, 15px) rotate(-1deg); }
  }

  .container {
    width: 100%;
    max-width: 520px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03),
                0 20px 60px rgba(0,0,0,0.5);
  }

  .icon-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }

  .icon-ring.success {
    background: var(--success-glow);
    box-shadow: 0 0 30px var(--success-glow);
  }

  .icon-ring.error {
    background: var(--error-glow);
    box-shadow: 0 0 30px var(--error-glow);
  }

  .icon-ring svg {
    width: 32px;
    height: 32px;
  }

  .icon-ring.success svg { color: var(--success); }
  .icon-ring.error svg { color: var(--error); }

  .checkmark {
    animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  @keyframes scaleIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 32px;
  }

  .code-container {
    position: relative;
    margin-bottom: 24px;
  }

  .code-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.6;
    text-align: left;
    user-select: all;
    cursor: text;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .code-box:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    background: var(--accent);
    color: white;
    position: relative;
    overflow: hidden;
  }

  .copy-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(129, 140, 248, 0.3);
  }

  .copy-btn:active {
    transform: translateY(0);
  }

  .copy-btn.copied {
    background: var(--success);
  }

  .copy-btn.copied:hover {
    box-shadow: 0 8px 24px rgba(52, 211, 153, 0.3);
  }

  .copy-btn svg {
    width: 16px;
    height: 16px;
    transition: opacity 0.2s;
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
    margin-top: 24px;
    line-height: 1.5;
  }

  .hint code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .brand {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .brand .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Error state */
  .error-msg {
    color: var(--error);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .retry-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .retry-link:hover { opacity: 0.8; }
</style>
</head>
<body>

<div class="container">
  <div class="card" id="card">
    <!-- Content injected by JS -->
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const card = document.getElementById('card');

  if (error) {
    card.innerHTML = `
      <div class="icon-ring error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h1>Authorization Failed</h1>
      <p class="error-msg">${escapeHtml(params.get('error_description') || error)}</p>
      <a href="javascript:history.back()" class="retry-link">← Go back and try again</a>
      <div class="brand"><div class="dot"></div> Envision OS</div>
    `;
    return;
  }

  if (!code) {
    card.innerHTML = `
      <div class="icon-ring error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h1>No Authorization Code</h1>
      <p class="error-msg">This page should be reached via the Google OAuth flow.<br>Please start the connection from your Envision OS chat.</p>
      <div class="brand"><div class="dot"></div> Envision OS</div>
    `;
    return;
  }

  // Success state
  card.innerHTML = `
    <div class="icon-ring success">
      <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Authorization Successful</h1>
    <p class="subtitle">Copy the code below and paste it into your<br>Envision OS chat to complete the connection.</p>
    <div class="code-container">
      <div class="code-box" id="codeBox">${escapeHtml(code)}</div>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">
      <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="copyText">Copy Code</span>
    </button>
    <p class="hint">Paste this in your chat: <code>connect with code [paste here]</code></p>
    <div class="brand"><div class="dot"></div> Envision OS</div>
  `;

  // Auto-select the code
  setTimeout(() => {
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('codeBox'));
    sel.removeAllRanges();
    sel.addRange(range);
  }, 700);

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  window.copyCode = async function() {
    try {
      await navigator.clipboard.writeText(code);
      const btn = document.getElementById('copyBtn');
      const copyIcon = document.getElementById('copyIcon');
      const checkIcon = document.getElementById('checkIcon');
      const copyText = document.getElementById('copyText');
      
      btn.classList.add('copied');
      copyIcon.style.display = 'none';
      checkIcon.style.display = 'block';
      copyText.textContent = 'Copied!';
      
      setTimeout(() => {
        btn.classList.remove('copied');
        copyIcon.style.display = 'block';
        checkIcon.style.display = 'none';
        copyText.textContent = 'Copy Code';
      }, 3000);
    } catch(e) {
      // Fallback: select the text
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(document.getElementById('codeBox'));
      sel.removeAllRanges();
      sel.addRange(range);
    }
  };

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
