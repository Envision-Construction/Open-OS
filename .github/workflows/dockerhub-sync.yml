name: DockerHub Sync

on:
  push:
    branches:
      - main
    paths:
      - dlp-proxy/**
      - .github/workflows/dockerhub-sync.yml
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push dlp-proxy
        uses: docker/build-push-action@v6
        with:
          context: ./dlp-proxy
          file: ./dlp-proxy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/open-os-dlp-proxy:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/open-os-dlp-proxy:latest
