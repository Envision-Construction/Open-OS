apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlp-proxy
  namespace: open-os
  labels:
    app.kubernetes.io/name: dlp-proxy
    app.kubernetes.io/part-of: open-os
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: dlp-proxy
  template:
    metadata:
      labels:
        app: dlp-proxy
        app.kubernetes.io/name: dlp-proxy
    spec:
      serviceAccountName: openclaw-sa
      automountServiceAccountToken: true  # Needs Workload Identity for DLP API
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dlp-proxy
          image: docker.io/avireddy0/open-os-dlp-proxy:v2.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OPENCLAW_UPSTREAM
              value: "http://openclaw:11434"
            - name: GCP_PROJECT_ID
              value: "open-os-prod"
            - name: DLP_MIN_LIKELIHOOD
              value: "LIKELY"
            - name: BLOCK_ON_FINDING
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openos-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openos-secrets
                  key: google-client-secret
            - name: OAUTH_REDIRECT_URI
              value: "https://os.envsn.com/oauth/callback"
            # Slack OAuth
            - name: SLACK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openos-secrets
                  key: slack-client-id
                  optional: true
            - name: SLACK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openos-secrets
                  key: slack-client-secret
                  optional: true
            # WhatsApp via Evolution API
            - name: EVOLUTION_API_URL
              value: "http://evolution-api:8080"
            - name: EVOLUTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openos-secrets
                  key: evolution-api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: token-store
              mountPath: /data/tokens
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: token-store
          persistentVolumeClaim:
            claimName: dlp-proxy-tokens
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dlp-proxy-tokens
  namespace: open-os
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 1Gi
