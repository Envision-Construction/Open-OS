apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlp-proxy
  namespace: openclaw
  labels:
    app.kubernetes.io/name: dlp-proxy
    app.kubernetes.io/part-of: open-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlp-proxy
  template:
    metadata:
      labels:
        app: dlp-proxy
        app.kubernetes.io/name: dlp-proxy
    spec:
      serviceAccountName: openclaw-sa
      automountServiceAccountToken: true  # Needs Workload Identity for DLP API
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dlp-proxy
          image: us-central1-docker.pkg.dev/open-os-prod/openclaw-registry/dlp-proxy:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OPENCLAW_UPSTREAM
              value: "http://openclaw:11434"
            - name: GCP_PROJECT_ID
              value: "open-os-prod"
            - name: DLP_MIN_LIKELIHOOD
              value: "LIKELY"
            - name: BLOCK_ON_FINDING
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
