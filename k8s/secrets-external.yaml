# ExternalSecret CRDs — pulls secrets from GCP Secret Manager into K8s Secrets
# Requires: External Secrets Operator installed on the cluster
# Install: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# The SecretStore uses GCP Workload Identity via the openclaw-sa service account.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: openclaw
spec:
  provider:
    gcpsm:
      projectID: open-os-prod

---
# ─── OpenClaw secrets (API keys, tokens) ─────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: openclaw-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: anthropic-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: openai-api-key
    - secretKey: google-api-key
      remoteRef:
        key: google-api-key
    - secretKey: slack-bot-token
      remoteRef:
        key: slack-bot-token
    - secretKey: slack-app-token
      remoteRef:
        key: slack-app-token
    - secretKey: webui-secret-key
      remoteRef:
        key: open-webui-secret

---
# ─── IAP OAuth secret ────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iap-oauth-secret
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: iap-oauth-secret
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: iap-oauth-client-id
    - secretKey: client_secret
      remoteRef:
        key: iap-oauth-client-secret

---
# ─── OAuth credentials for Google integrations (gog skill) ───────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: google-oauth-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: google-oauth-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: google-oauth-client-id
    - secretKey: client-secret
      remoteRef:
        key: google-oauth-client-secret
    - secretKey: refresh-token
      remoteRef:
        key: google-oauth-refresh-token
