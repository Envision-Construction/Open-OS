# ─── Default deny all ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: open-os
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ─── Open WebUI: allow ingress from GCP load balancer only ────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-webui
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: open-webui
  policyTypes:
    - Ingress
  ingress:
    # GCP health checks and load balancer
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16
        - ipBlock:
            cidr: 130.211.0.0/22
      ports:
        - port: 8080
          protocol: TCP

---
# ─── DLP Proxy: allow ingress from Open WebUI only ───────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webui-to-dlp-proxy
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: dlp-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: open-webui
      ports:
        - port: 8080
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gclb-healthchecks-to-dlp-proxy
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: dlp-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16
        - ipBlock:
            cidr: 130.211.0.0/22
      ports:
        - port: 8080
          protocol: TCP

---
# ─── Evolution API: allow ingress from DLP Proxy and Open WebUI ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dlp-proxy-to-evolution-api
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: evolution-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dlp-proxy
        - podSelector:
            matchLabels:
              app: open-webui
      ports:
        - port: 8080
          protocol: TCP

---
# ─── OpenClaw: allow ingress from DLP Proxy only ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dlp-proxy-to-openclaw
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dlp-proxy
      ports:
        - port: 11434
          protocol: TCP

---
# ─── Default deny all egress (optional, strict) ──────────────────────────────
# Uncomment to enforce strict egress. Note: requires allowing DNS, DLP API, and LLM APIs.
# apiVersion: networking.k8s.io/v1
# kind: NetworkPolicy
# metadata:
#   name: default-deny-egress
#   namespace: open-os
# spec:
#   podSelector: {}
#   policyTypes:
#     - Egress

---
# ─── DLP Proxy: allow egress to Evolution API ───────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dlp-proxy-egress-to-evolution-api
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: dlp-proxy
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: evolution-api
      ports:
        - port: 8080
          protocol: TCP

---
# ─── Allow DNS egress for all pods ───────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: open-os
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# ─── Allow HTTPS egress for pods needing external API access ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-https-egress
  namespace: open-os
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [openclaw, dlp-proxy, open-webui]
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP

---
# ─── Evolution API: allow ingress to Postgres ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-evolution-api-to-postgres
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: evolution-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: evolution-api
      ports:
        - port: 5432
          protocol: TCP

---
# ─── Evolution API: allow ingress to Valkey ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-evolution-api-to-valkey
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: valkey
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: evolution-api
      ports:
        - port: 6379
          protocol: TCP

---
# ─── Evolution API: allow egress to Postgres, Valkey, and HTTPS ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-evolution-api-egress
  namespace: open-os
spec:
  podSelector:
    matchLabels:
      app: evolution-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: evolution-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: valkey
      ports:
        - port: 6379
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 5222
          protocol: TCP
