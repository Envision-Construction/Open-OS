apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: openclaw
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: open-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
        app.kubernetes.io/name: open-webui
    spec:
      serviceAccountName: openclaw-sa
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Point to DLP proxy instead of OpenClaw directly
            - name: OPENAI_API_BASE_URL
              value: "http://dlp-proxy:8080/v1"
            - name: OPENAI_API_KEY
              value: "sk-placeholder"  # OpenClaw doesn't need real key for local proxy
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: webui-secret-key
            - name: ENABLE_SIGNUP
              value: "false"
            - name: DEFAULT_USER_ROLE
              value: "user"
            - name: WEBUI_AUTH
              value: "true"
            - name: ENABLE_RAG_WEB_SEARCH
              value: "false"
            - name: ENABLE_IMAGE_GENERATION
              value: "false"
            - name: RAG_EMBEDDING_ENGINE
              value: "openai"
            - name: OFFLINE_MODE
              value: "true"
            - name: ENABLE_RAG_LOCAL_WEB_FETCH
              value: "false"
            - name: ENABLE_COMMUNITY_SHARING
              value: "false"
            # Branding
            - name: WEBUI_NAME
              value: "Envision OS"
            - name: WEBUI_URL
              value: "https://os.envsn.com"
            # Security
            - name: CORS_ALLOW_ORIGIN
              value: "https://os.envsn.com"
            - name: ENABLE_ADMIN_EXPORT
              value: "false"
            - name: ENABLE_ADMIN_CHAT_ACCESS
              value: "false"
            # Performance
            - name: DATABASE_POOL_SIZE
              value: "20"
            - name: THREAD_POOL_SIZE
              value: "100"
            - name: ENABLE_REALTIME_CHAT_SAVE
              value: "false"
          volumeMounts:
            - name: webui-data
              mountPath: /app/backend/data
            - name: branding-bg
              mountPath: /app/backend/open_webui/static/background.jpg
              subPath: background.jpg
              readOnly: true
            - name: branding-logo
              mountPath: /app/backend/open_webui/static/logo.png
              subPath: logo.png
              readOnly: true
            - name: branding-favicon
              mountPath: /app/backend/open_webui/static/favicon.png
              subPath: favicon.png
              readOnly: true
            - name: branding-css
              mountPath: /app/backend/open_webui/static/custom.css
              subPath: custom.css
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Open WebUI needs writable data dir
            capabilities:
              drop: ["ALL"]
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            failureThreshold: 120
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
      volumes:
        - name: webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
        - name: branding-bg
          configMap:
            name: branding-background
        - name: branding-logo
          configMap:
            name: branding-logo
        - name: branding-favicon
          configMap:
            name: branding-favicon
        - name: branding-css
          configMap:
            name: branding-css
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: openclaw
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 5Gi
